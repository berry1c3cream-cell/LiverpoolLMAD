<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Liverpool - Inicia sesión</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#e6e6e6;
}

/* Barra superior */
.header{
    background:#e6007e;
    padding:15px;
    text-align:center;
}

.header img{
    height:30px;
}

/* Contenedor */
.container{
    width:320px;
    margin:80px auto;
    text-align:center;
}

/* Título */
.container h2{
    font-weight:normal;
    color:#333;
    margin-bottom:30px;
}

/* Labels */
label{
    display:block;
    text-align:left;
    font-size:12px;
    letter-spacing:2px;
    color:#444;
    margin-top:15px;
}

/* Inputs */
input{
    width:100%;
    padding:10px;
    border:2px solid #e6007e;
    outline:none;
    margin-top:5px;
    background:#fff;
}

/* Link recuperar */
.forgot{
    display:block;
    margin-top:10px;
    color:#e6007e;
    font-size:14px;
    text-decoration:none;
}

/* Botones */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    background:#4b1e83;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#3b1569;
}

</style>
</head>

<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Liverpool_logo.svg" alt="Liverpool">
</div>

<div class="container">

<h2>Inicia sesión</h2>

<label>CORREO ELECTRÓNICO *</label>
<input type="email">

<label>CONTRASEÑA *</label>
<input type="password">

<a class="forgot" href="#">¿Olvidaste tu contraseña?</a>

<button>INICIAR SESIÓN</button>
<button>CREAR CUENTA</button>

</div>

</body>
</html>
